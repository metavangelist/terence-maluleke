<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Gallery</title>
  <link rel="stylesheet" href="mobile.css" />
  <style>
    :root {
      --paper: #ffffff;
      --ink: #0f1722;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
    }

    .back {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 30;
      color: var(--ink);
      text-decoration: none;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 20px;
      font-weight: 400;
      text-transform: lowercase;
    }

    .stage {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame-scene {
      transition: transform 220ms ease;
    }

    .inset-piece {
      display: inline-block;
      width: fit-content;
      height: fit-content;
      filter:
        drop-shadow(0 22px 40px rgba(0, 0, 0, 0.2))
        drop-shadow(0 6px 14px rgba(0, 0, 0, 0.1));
    }

    .inset-mat {
      position: relative;
      display: inline-block;
      width: fit-content;
      height: fit-content;
      padding: 10px;
      background: linear-gradient(165deg, #fafafa 0%, #ececec 45%, #d4d4d4 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -2px 5px rgba(0, 0, 0, 0.1),
        0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .inset-mat::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow:
        inset 1px 1px 0 rgba(255, 255, 255, 0.7),
        inset -1px -1px 0 rgba(0, 0, 0, 0.06);
    }

    .inset-lip {
      display: inline-block;
      width: fit-content;
      height: fit-content;
      padding: 2px;
      background: linear-gradient(180deg, #5a5a5a 0%, #2e2e2e 52%, #181818 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 -2px 4px rgba(0, 0, 0, 0.55),
        0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .inset-cavity {
      position: relative;
      display: inline-block;
      width: fit-content;
      height: fit-content;
      padding: 5px 5px 7px;
      background: #0c0c0c;
      overflow: hidden;
      box-shadow:
        inset 0 18px 32px rgba(0, 0, 0, 0.72),
        inset 12px 0 22px rgba(0, 0, 0, 0.4),
        inset -4px -4px 10px rgba(255, 255, 255, 0.04),
        inset 0 0 0 1px rgba(0, 0, 0, 0.65);
    }

    .inset-cavity::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      box-shadow:
        inset 0 10px 16px rgba(0, 0, 0, 0.5),
        inset 8px 0 14px rgba(0, 0, 0, 0.28);
    }

    .inset-cavity::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.45) 0%, rgba(0, 0, 0, 0.08) 18%, transparent 40%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.28) 0%, transparent 22%);
    }

    #artImage {
      position: relative;
      z-index: 1;
      display: block;
      width: auto;
      height: auto;
      max-width: min(300px, 42vw);
      max-height: min(380px, 54vh);
      object-fit: contain;
      transform: translateY(3px);
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.5),
        0 2px 4px rgba(0, 0, 0, 0.35);
    }

    .nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      border: 0;
      background: transparent;
      color: var(--ink);
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      padding: 16px;
      opacity: 0.45;
    }

    .nav:hover { opacity: 1; }
    .nav-prev { left: 12px; }
    .nav-next { right: 12px; }

    .counter {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      opacity: 0.55;
    }

    .art-slot {
      display: block;
      line-height: 0;
      font-size: 0;
    }

    @media (max-width: 768px) {
      .stage {
        padding: 0 52px;
        box-sizing: border-box;
      }

      .frame-scene {
        transition: none;
      }

      /* Collapse nested fit-content chain — Safari was sizing frame to full image intrinsic height */
      .inset-mat,
      .inset-lip {
        display: contents;
      }

      .inset-piece {
        display: inline-block;
        filter: none;
        padding: 8px;
        background: linear-gradient(165deg, #fafafa 0%, #ececec 45%, #d4d4d4 100%);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      }

      .inset-mat::before {
        display: none;
      }

      .inset-cavity {
        display: inline-block;
        padding: 5px;
        line-height: 0;
        border: 2px solid #2e2e2e;
        box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.3);
      }

      .inset-cavity::before,
      .inset-cavity::after {
        display: none;
      }

      .art-slot {
        overflow: hidden;
        max-width: min(260px, 76vw);
        max-height: min(52dvh, 480px);
      }

      #artImage {
        display: block;
        width: 100%;
        height: 100%;
        max-width: min(260px, 76vw);
        max-height: min(52dvh, 480px);
        object-fit: contain;
        transform: none;
        box-shadow: none;
      }

      .nav {
        font-size: 36px;
        padding: 18px 14px;
        min-width: 48px;
        min-height: 48px;
        opacity: 0.65;
      }

      .nav-prev {
        left: max(4px, env(safe-area-inset-left));
      }

      .nav-next {
        right: max(4px, env(safe-area-inset-right));
      }

      .counter {
        bottom: max(14px, env(safe-area-inset-bottom));
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <a class="back" href="index.html" aria-label="Back to home">back</a>
  <button class="nav nav-prev" id="prevBtn" type="button" aria-label="Previous artwork">‹</button>
  <button class="nav nav-next" id="nextBtn" type="button" aria-label="Next artwork">›</button>
  <p class="counter" id="counter" aria-live="polite"></p>

  <main class="stage" aria-label="Gallery">
    <div class="frame-scene" id="frameScene">
      <div class="inset-piece">
        <div class="inset-mat">
          <div class="inset-lip">
            <div class="inset-cavity">
              <div class="art-slot" id="artSlot">
                <img id="artImage" src="" alt="Artwork" decoding="async" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const catalog = [
      { file: "AFTER FAIR 001.jpg", title: "After Fair 001", format: "digital painting", medium: "archival print", year: "2024" },
      { file: "AFTER FAIR 002.jpg", title: "After Fair 002", format: "digital painting", medium: "archival print", year: "2024" },
      { file: "Alone.jpg", title: "Alone", format: "canvas", medium: "acrylic", year: "2023" },
      { file: "Artwork 1.jpg", title: "Artwork 1", format: "study", medium: "mixed media", year: "2022" },
      { file: "Artwork 2.jpg", title: "Artwork 2", format: "study", medium: "mixed media", year: "2022" },
      { file: "CARRY YOURS.jpg", title: "Carry Yours", format: "portrait", medium: "digital", year: "2025" },
      { file: "Crimson Accord 3 small.jpg", title: "Crimson Accord", format: "small work", medium: "gouache", year: "2021" },
      { file: "DSC01349.jpg", title: "DSC01349", format: "photograph", medium: "inkjet", year: "2023" },
      { file: "DSC01668_2.jpg", title: "DSC01668", format: "photograph", medium: "inkjet", year: "2023" },
      { file: "DSC07737.jpg", title: "DSC07737", format: "photograph", medium: "inkjet", year: "2024" },
      { file: "Glory days 2.jpg", title: "Glory Days 2", format: "figurative", medium: "digital & paint", year: "2025" },
      { file: "HOME 04 copy.jpg", title: "Home 04", format: "interior scene", medium: "acrylic", year: "2020" },
      { file: "My buried jesus ii.jpg", title: "My Buried Jesus II", format: "still life", medium: "oil", year: "2019" },
      { file: "Shine.jpg", title: "Shine", format: "portrait", medium: "digital", year: "2024" },
      { file: "Simone co.jpg", title: "Simone Co", format: "portrait", medium: "acrylic", year: "2023" },
      { file: "Simone.jpg", title: "Simone", format: "portrait", medium: "acrylic", year: "2023" },
      { file: "Swallowed.jpg", title: "Swallowed", format: "figurative", medium: "mixed media", year: "2022" },
      { file: "cbb.jpg", title: "CBB", format: "study", medium: "charcoal", year: "2021" },
      { file: "hidden.jpg", title: "Hidden", format: "concept", medium: "digital", year: "2024" },
      { file: "lamp.jpg", title: "Lamp", format: "still life", medium: "digital", year: "2023" },
      { file: "sky.jpg", title: "Sky", format: "landscape", medium: "digital", year: "2025" }
    ];

    const artImage = document.getElementById("artImage");
    const counter = document.getElementById("counter");
    const frameScene = document.getElementById("frameScene");
    let index = 0;

    function imageSrc(file) {
      return `assets/images/${encodeURIComponent(file)}`;
    }

    function show(indexToShow) {
      index = (indexToShow + catalog.length) % catalog.length;
      const item = catalog[index];
      artImage.src = imageSrc(item.file);
      artImage.alt = item.title;
      counter.textContent = `${index + 1} / ${catalog.length}`;
    }

    function step(delta) {
      show(index + delta);
    }

    frameScene.addEventListener("animationiteration", () => {
      step(1);
    });

    document.getElementById("prevBtn").addEventListener("click", () => step(-1));
    document.getElementById("nextBtn").addEventListener("click", () => step(1));

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") step(-1);
      if (e.key === "ArrowRight") step(1);
    });

    let touchX = 0;
    document.addEventListener("touchstart", (e) => {
      touchX = e.changedTouches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      const dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) < 40) return;
      step(dx < 0 ? 1 : -1);
    }, { passive: true });

    artImage.addEventListener("error", () => step(1));

    show(0);
  </script>
</body>
</html>
