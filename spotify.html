<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Spotify Playlist</title>
  <link rel="preconnect" href="https://open.spotify.com" />
  <link rel="dns-prefetch" href="https://open.spotify.com" />
  <link rel="stylesheet" href="mobile.css" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      font-family: "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    .wrap {
      height: 100%;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    .back {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #111;
      text-decoration: none;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 20px;
      letter-spacing: 0.01em;
      line-height: 1;
      font-weight: 400;
      text-transform: lowercase;
      z-index: 10;
    }

    .embed-shell {
      position: relative;
      z-index: 30;
      width: min(472px, 55.7vw);
      height: min(378px, 47.1vh);
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border-radius: 0;
      padding: 0;
      box-sizing: border-box;
      transform: translateY(calc(42px + 5vh));
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 12px;
    }

    .frame {
      position: absolute;
      inset: 36px 0 36px 0;
      z-index: 5;
      pointer-events: none;
      overflow: visible;
    }

    .spiral-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .spiral-text {
      fill: #111;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(44px, 4.7vw, 58px);
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    @media (max-width: 768px) {
      .back {
        top: max(12px, env(safe-area-inset-top));
        left: max(12px, env(safe-area-inset-left));
      }

      .embed-shell {
        width: min(300px, 77.2vw);
        height: min(241px, 32.1vh);
        transform: translateY(0);
      }

      .frame {
        inset: max(52px, env(safe-area-inset-top) + 44px) 4px max(38px, env(safe-area-inset-bottom) + 26px) 4px;
      }

      .frame .spiral-svg {
        display: none;
      }

      .frame .spiral-svg-mobile {
        display: block;
      }

      .frame {
        overflow: visible;
      }

      .spiral-text {
        font-size: clamp(15px, 3.6vw, 20px);
      }
    }

    .spiral-svg-mobile {
      display: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html" aria-label="Back to home">back</a>
  <main class="wrap" aria-label="Spotify playlist page">
    <div class="frame" aria-label="Moving text frame">
      <svg class="spiral-svg" viewBox="0 0 1000 760" preserveAspectRatio="xMidYMid meet">
        <defs>
          <path id="spiralPath" d="M 0 62 H 1000 V 698 H 0 V 130 H 940 V 630 H 60 V 198 H 880 V 562 H 120 V 266 H 820 V 494 H 340" />
        </defs>
        <text class="spiral-text">
          <textPath id="spiralTextA" href="#spiralPath" startOffset="0%"></textPath>
        </text>
      </svg>
      <svg class="spiral-svg-mobile" viewBox="0 0 400 822" preserveAspectRatio="none">
        <defs>
          <path id="spiralPathMobile" d="M 200 620 V 180 H 260 V 680 H 140 V 120 H 320 V 740 H 80 V 60 H 380 V 794 H 20 V 0" />
        </defs>
        <text class="spiral-text">
          <textPath id="spiralTextMobile" href="#spiralPathMobile" startOffset="0%"></textPath>
        </text>
      </svg>
    </div>
    <div class="embed-shell">
      <iframe
        id="spotifyEmbed"
        title="Spotify playlist"
        data-src="https://open.spotify.com/embed/playlist/1vuOTBPavAwTsYt5ROcrDL?utm_source=generator&theme=0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      ></iframe>
    </div>
  </main>
  <script>
    const NS = "http://www.w3.org/2000/svg";
    const africaHighlight = "#0018A8";
    const SPOTIFY_EMBED_SRC =
      "https://open.spotify.com/embed/playlist/1vuOTBPavAwTsYt5ROcrDL?utm_source=generator&theme=0";

    function loadSpotifyEmbed() {
      const iframe = document.getElementById("spotifyEmbed");
      if (!iframe || iframe.src) return;
      iframe.src = iframe.getAttribute("data-src") || SPOTIFY_EMBED_SRC;
    }

    if ("requestIdleCallback" in window) {
      requestIdleCallback(loadSpotifyEmbed, { timeout: 2500 });
    } else {
      setTimeout(loadSpotifyEmbed, 0);
    }
    const phrase = "\"When the rhythm of the music changes, the dance steps must also change.\" (Widely across Africa) Meaning: Life is constantly in flux, and the only constant is change. To survive and thrive, you must be flexible enough to adjust your approach when circumstances shift.";
    const loopText = `${phrase} \u2022 `.repeat(12);
    const spiralA = document.getElementById("spiralTextA");
    const spiralMobile = document.getElementById("spiralTextMobile");

    function fillSpiralText(textPath, text) {
      textPath.textContent = "";
      const parts = text.split(/(Africa)/gi);
      parts.forEach((part) => {
        if (!part) return;
        const tspan = document.createElementNS(NS, "tspan");
        tspan.textContent = part;
        if (part.toLowerCase() === "africa") tspan.setAttribute("fill", africaHighlight);
        textPath.appendChild(tspan);
      });
    }

    fillSpiralText(spiralA, loopText);
    fillSpiralText(spiralMobile, loopText);

    let offset = 0;
    function animateSpiral() {
      offset = (offset - 0.015) % 100;
      const value = `${offset}%`;
      spiralA.setAttribute("startOffset", value);
      spiralMobile.setAttribute("startOffset", value);
      requestAnimationFrame(animateSpiral);
    }
    requestAnimationFrame(animateSpiral);
  </script>
</body>
</html>
