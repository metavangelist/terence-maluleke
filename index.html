  <script>
    function formatNow(date = new Date()) {
      const weekdays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      const h = date.getHours();
      const hh = h % 12 || 12;
      const mm = String(date.getMinutes()).padStart(2, "0");
      const ss = String(date.getSeconds()).padStart(2, "0");
      const ampm = h < 12 ? "AM" : "PM";
      return `${weekdays[date.getDay()]}, ${date.getDate()} ${months[date.getMonth()]} · ${hh}:${mm}:${ss} ${ampm}`;
    }

    const nowEl = document.getElementById("homeNow");
    function tickNow() {
      nowEl.textContent = formatNow();
    }
    tickNow();
    setInterval(tickNow, 1000);

    const SPOTIFY_EMBED_SRC =
      "https://open.spotify.com/embed/playlist/1vuOTBPavAwTsYt5ROcrDL?utm_source=generator&theme=0";
    const spotifyLink = document.querySelector('a[href="spotify.html"]');
    let spotifyEmbedWarm = false;

    function warmSpotifyEmbed() {
      if (spotifyEmbedWarm) return;
      spotifyEmbedWarm = true;
      const warm = document.createElement("iframe");
      warm.src = SPOTIFY_EMBED_SRC;
      warm.tabIndex = -1;
      warm.setAttribute("aria-hidden", "true");
      warm.style.cssText =
        "position:absolute;width:0;height:0;border:0;opacity:0;pointer-events:none;visibility:hidden";
      document.body.appendChild(warm);
    }

    if (spotifyLink) {
      spotifyLink.addEventListener("mouseenter", warmSpotifyEmbed, { once: true });
      spotifyLink.addEventListener("focus", warmSpotifyEmbed, { once: true });
    }
  </script>
</body>
